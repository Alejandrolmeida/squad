<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1792 1024" width="1792" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="glow-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0078d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }
      @keyframes float { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-18px)} }
      @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
      @keyframes rotate-slow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      .star { animation: twinkle var(--d, 2s) ease-in-out infinite; }
      .hero { animation: float 4s ease-in-out infinite; transform-origin: 896px 460px; }
      .hex { animation: pulse var(--d, 3s) ease-in-out infinite; }
      .orbit { animation: rotate-slow 20s linear infinite; transform-origin: 896px 460px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1792" height="1024" fill="url(#bg)"/>
  <rect width="1792" height="1024" fill="url(#glow-center)"/>

  <!-- Stars -->
  <circle class="star" style="--d:1.8s" cx="120" cy="80" r="1.5" fill="#ffffff"/>
  <circle class="star" style="--d:2.3s" cx="340" cy="45" r="1" fill="#50e6ff"/>
  <circle class="star" style="--d:1.5s" cx="580" cy="110" r="2" fill="#ffffff"/>
  <circle class="star" style="--d:3.1s" cx="780" cy="30" r="1" fill="#ffffff"/>
  <circle class="star" style="--d:2.7s" cx="960" cy="65" r="1.5" fill="#50e6ff"/>
  <circle class="star" style="--d:1.9s" cx="1150" cy="90" r="1" fill="#ffffff"/>
  <circle class="star" style="--d:2.5s" cx="1380" cy="40" r="2" fill="#ffffff"/>
  <circle class="star" style="--d:3.4s" cx="1560" cy="75" r="1" fill="#50e6ff"/>
  <circle class="star" style="--d:1.6s" cx="1700" cy="120" r="1.5" fill="#ffffff"/>
  <circle class="star" style="--d:2.1s" cx="60" cy="220" r="1" fill="#ffffff"/>
  <circle class="star" style="--d:2.9s" cx="230" cy="180" r="2" fill="#50e6ff"/>
  <circle class="star" style="--d:1.7s" cx="460" cy="250" r="1" fill="#ffffff"/>
  <circle class="star" style="--d:3.2s" cx="640" cy="200" r="1.5" fill="#ffffff"/>
  <circle class="star" style="--d:2.4s" cx="1100" cy="170" r="1" fill="#50e6ff"/>
  <circle class="star" style="--d:1.3s" cx="1300" cy="230" r="2" fill="#ffffff"/>
  <circle class="star" style="--d:2.8s" cx="1480" cy="160" r="1" fill="#ffffff"/>
  <circle class="star" style="--d:3.6s" cx="1650" cy="210" r="1.5" fill="#50e6ff"/>
  <circle class="star" style="--d:2.0s" cx="100" cy="400" r="1" fill="#ffffff"/>
  <circle class="star" style="--d:1.4s" cx="280" cy="380" r="1.5" fill="#ffffff"/>
  <circle class="star" style="--d:2.6s" cx="1500" cy="360" r="1" fill="#50e6ff"/>
  <circle class="star" style="--d:3.0s" cx="1700" cy="420" r="2" fill="#ffffff"/>
  <circle class="star" style="--d:1.1s" cx="150" cy="700" r="1.5" fill="#50e6ff"/>
  <circle class="star" style="--d:2.2s" cx="350" cy="760" r="1" fill="#ffffff"/>
  <circle class="star" style="--d:3.5s" cx="1450" cy="720" r="2" fill="#ffffff"/>
  <circle class="star" style="--d:1.8s" cx="1650" cy="680" r="1" fill="#50e6ff"/>
  <circle class="star" style="--d:2.7s" cx="80" cy="880" r="1.5" fill="#ffffff"/>
  <circle class="star" style="--d:1.5s" cx="300" cy="930" r="1" fill="#50e6ff"/>
  <circle class="star" style="--d:3.3s" cx="500" cy="870" r="2" fill="#ffffff"/>
  <circle class="star" style="--d:2.0s" cx="700" cy="950" r="1" fill="#ffffff"/>
  <circle class="star" style="--d:1.6s" cx="1100" cy="900" r="1.5" fill="#50e6ff"/>
  <circle class="star" style="--d:2.9s" cx="1350" cy="960" r="1" fill="#ffffff"/>
  <circle class="star" style="--d:1.2s" cx="1600" cy="880" r="2" fill="#ffffff"/>
  <circle class="star" style="--d:3.7s" cx="1750" cy="950" r="1" fill="#50e6ff"/>

  <!-- Decorative hexagons -->
  <polygon class="hex" style="--d:3.5s" points="200,480 230,463 260,480 260,514 230,531 200,514"
    fill="none" stroke="#0078d4" stroke-width="1.5" opacity="0.5"/>
  <polygon class="hex" style="--d:2.8s" points="1550,320 1590,298 1630,320 1630,364 1590,386 1550,364"
    fill="none" stroke="#50e6ff" stroke-width="1" opacity="0.4"/>
  <polygon class="hex" style="--d:4.1s" points="320,700 360,678 400,700 400,744 360,766 320,744"
    fill="none" stroke="#0078d4" stroke-width="1.5" opacity="0.35"/>
  <polygon class="hex" style="--d:3.2s" points="1400,750 1440,728 1480,750 1480,794 1440,816 1400,794"
    fill="none" stroke="#50e6ff" stroke-width="1" opacity="0.45"/>
  <polygon class="hex" style="--d:2.5s" points="850,150 880,133 910,150 910,184 880,201 850,184"
    fill="none" stroke="#0078d4" stroke-width="1" opacity="0.4"/>

  <!-- Orbit ring -->
  <ellipse class="orbit" cx="896" cy="460" rx="200" ry="60"
    fill="none" stroke="#0078d4" stroke-width="1" stroke-dasharray="8,6" opacity="0.3"/>

  <!-- Central glow -->
  <circle cx="896" cy="460" r="150" fill="none" stroke="#0078d4" stroke-width="1" opacity="0.15"/>
  <circle cx="896" cy="460" r="100" fill="none" stroke="#50e6ff" stroke-width="0.5" opacity="0.2"/>

  <!-- Cat astronaut hero -->
  <text x="896" y="490" class="hero" text-anchor="middle" font-size="140"
    filter="url(#glow-strong)" opacity="0.95">🐱🚀</text>

  <!-- Squad icons orbiting -->
  <g class="orbit">
    <text x="1096" y="460" text-anchor="middle" font-size="30" opacity="0.7">🏗️</text>
    <text x="696" y="460" text-anchor="middle" font-size="30" opacity="0.7">🎨</text>
    <text x="896" y="405" text-anchor="middle" font-size="30" opacity="0.7">✍️</text>
    <text x="896" y="520" text-anchor="middle" font-size="30" opacity="0.7">🚀</text>
  </g>

  <!-- Title -->
  <text x="896" y="640" text-anchor="middle" font-family="'Courier New', Courier, monospace"
    font-size="42" font-weight="bold" fill="#50e6ff" filter="url(#glow)" opacity="0.95"
    letter-spacing="2">Bienvenidos al Kitten Agent Blog</text>

  <!-- Subtitle line -->
  <line x1="496" y1="665" x2="1296" y2="665" stroke="#0078d4" stroke-width="1" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="896" y="700" text-anchor="middle" font-family="'Courier New', Courier, monospace"
    font-size="22" fill="#0078d4" opacity="0.8" letter-spacing="1">Kitten Agent Squad — AgentCamp 2026</text>

  <!-- Badge SVG mode -->
  <text x="1760" y="1010" text-anchor="end" font-family="'Courier New', Courier, monospace"
    font-size="14" fill="#0078d4" opacity="0.5">svg-mode</text>
</svg>
