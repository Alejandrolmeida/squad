<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1792 1024" width="1792" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="glow-orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0078d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }
      @keyframes twinkle2 { 0%,100%{opacity:0.5} 50%{opacity:0.1} }
      @keyframes float { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-18px)} }
      @keyframes orbit { 0%{transform:rotate(0deg) translateX(180px) rotate(0deg)} 100%{transform:rotate(360deg) translateX(180px) rotate(-360deg)} }
      @keyframes pulse { 0%,100%{opacity:0.4;r:3} 50%{opacity:1;r:5} }
      @keyframes drift { 0%{transform:translate(0,0)} 25%{transform:translate(8px,-5px)} 50%{transform:translate(3px,-12px)} 75%{transform:translate(-5px,-7px)} 100%{transform:translate(0,0)} }
      .star { animation: twinkle var(--d,2s) var(--delay,0s) infinite; }
      .star2 { animation: twinkle2 var(--d,3s) var(--delay,0s) infinite; }
      .hero { animation: float 5s ease-in-out infinite; }
      .moon { animation: orbit 20s linear infinite; transform-origin: 896px 430px; }
      .hex { animation: drift var(--d,8s) ease-in-out infinite; }
    </style>
  </defs>

  <!-- Fondo espacial -->
  <rect width="1792" height="1024" fill="url(#bg)"/>

  <!-- Nebula glow -->
  <ellipse cx="700" cy="350" rx="400" ry="250" fill="#6A0DAD" opacity="0.07"/>
  <ellipse cx="1100" cy="600" rx="350" ry="220" fill="#1E90FF" opacity="0.07"/>
  <ellipse cx="896" cy="430" rx="300" ry="200" fill="url(#glow-orb)"/>

  <!-- Estrellas — fondo -->
  <circle cx="45"  cy="80"  r="1.5" fill="#fff" class="star" style="--d:2.1s;--delay:0.0s"/>
  <circle cx="132" cy="210" r="1.0" fill="#fff" class="star" style="--d:3.4s;--delay:0.3s"/>
  <circle cx="258" cy="55"  r="2.0" fill="#fff" class="star" style="--d:1.8s;--delay:0.7s"/>
  <circle cx="380" cy="145" r="1.2" fill="#fff" class="star" style="--d:2.7s;--delay:1.1s"/>
  <circle cx="490" cy="30"  r="1.5" fill="#fff" class="star" style="--d:3.1s;--delay:0.5s"/>
  <circle cx="560" cy="185" r="1.0" fill="#fff" class="star" style="--d:2.3s;--delay:0.9s"/>
  <circle cx="620" cy="90"  r="1.8" fill="#D6EFFF" class="star2" style="--d:4.0s;--delay:0.2s"/>
  <circle cx="710" cy="250" r="1.2" fill="#fff" class="star" style="--d:2.9s;--delay:1.5s"/>
  <circle cx="790" cy="60"  r="1.0" fill="#fff" class="star" style="--d:3.6s;--delay:0.6s"/>
  <circle cx="850" cy="160" r="1.5" fill="#fff" class="star" style="--d:2.2s;--delay:0.4s"/>
  <circle cx="930" cy="35"  r="1.2" fill="#D6EFFF" class="star2" style="--d:3.8s;--delay:1.2s"/>
  <circle cx="1010" cy="130" r="1.8" fill="#fff" class="star" style="--d:2.5s;--delay:0.8s"/>
  <circle cx="1090" cy="75"  r="1.0" fill="#fff" class="star" style="--d:4.2s;--delay:0.1s"/>
  <circle cx="1170" cy="200" r="1.5" fill="#fff" class="star" style="--d:1.9s;--delay:1.3s"/>
  <circle cx="1250" cy="50"  r="2.0" fill="#fff" class="star" style="--d:3.0s;--delay:0.7s"/>
  <circle cx="1340" cy="170" r="1.2" fill="#D6EFFF" class="star2" style="--d:2.6s;--delay:1.0s"/>
  <circle cx="1420" cy="85"  r="1.5" fill="#fff" class="star" style="--d:3.3s;--delay:0.4s"/>
  <circle cx="1510" cy="220" r="1.0" fill="#fff" class="star" style="--d:2.0s;--delay:1.6s"/>
  <circle cx="1600" cy="60"  r="1.8" fill="#fff" class="star" style="--d:4.5s;--delay:0.2s"/>
  <circle cx="1680" cy="140" r="1.2" fill="#fff" class="star" style="--d:2.8s;--delay:0.9s"/>
  <circle cx="1750" cy="290" r="1.5" fill="#D6EFFF" class="star2" style="--d:3.7s;--delay:1.4s"/>
  <circle cx="80"  cy="400" r="1.0" fill="#fff" class="star" style="--d:3.2s;--delay:0.6s"/>
  <circle cx="170" cy="550" r="1.5" fill="#fff" class="star" style="--d:2.4s;--delay:0.3s"/>
  <circle cx="300" cy="470" r="1.2" fill="#fff" class="star" style="--d:4.1s;--delay:1.1s"/>
  <circle cx="1550" cy="400" r="1.0" fill="#fff" class="star" style="--d:2.9s;--delay:0.5s"/>
  <circle cx="1660" cy="520" r="1.5" fill="#D6EFFF" class="star2" style="--d:3.5s;--delay:1.7s"/>
  <circle cx="1720" cy="650" r="1.2" fill="#fff" class="star" style="--d:2.1s;--delay:0.8s"/>
  <circle cx="100" cy="750" r="1.8" fill="#fff" class="star" style="--d:3.9s;--delay:0.2s"/>
  <circle cx="240" cy="870" r="1.0" fill="#fff" class="star" style="--d:2.6s;--delay:1.0s"/>
  <circle cx="430" cy="930" r="1.5" fill="#fff" class="star" style="--d:4.3s;--delay:0.7s"/>
  <circle cx="620" cy="800" r="1.2" fill="#D6EFFF" class="star2" style="--d:3.1s;--delay:1.4s"/>
  <circle cx="1200" cy="850" r="1.5" fill="#fff" class="star" style="--d:2.7s;--delay:0.6s"/>
  <circle cx="1380" cy="920" r="1.0" fill="#fff" class="star" style="--d:3.4s;--delay:1.2s"/>
  <circle cx="1580" cy="870" r="1.8" fill="#fff" class="star" style="--d:2.2s;--delay:0.4s"/>
  <circle cx="1700" cy="780" r="1.2" fill="#D6EFFF" class="star2" style="--d:4.0s;--delay:1.8s"/>
  <!-- Estrellas extra -->
  <circle cx="950" cy="920" r="1.5" fill="#fff" class="star" style="--d:2.3s;--delay:0.9s"/>
  <circle cx="800" cy="970" r="1.0" fill="#fff" class="star" style="--d:3.6s;--delay:0.1s"/>
  <circle cx="1100" cy="960" r="1.2" fill="#fff" class="star" style="--d:2.8s;--delay:1.5s"/>

  <!-- Planeta / luna en órbita (Tierra lejana) -->
  <circle class="moon" cx="896" cy="250" r="18" fill="#1E90FF" opacity="0.6" filter="url(#glow)"/>
  <circle cx="896" cy="250" r="16" fill="#1a7fcf" class="moon" opacity="0.4"/>

  <!-- Hexágonos decorativos flotantes cyan -->
  <g class="hex" style="--d:9s" transform="translate(250,320)">
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="none" stroke="#00CFFF" stroke-width="1.5" opacity="0.35"/>
    <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="none" stroke="#00CFFF" stroke-width="0.8" opacity="0.2"/>
  </g>
  <g class="hex" style="--d:12s" transform="translate(1540,280)">
    <polygon points="0,-25 22,-13 22,13 0,25 -22,13 -22,-13" fill="none" stroke="#00CFFF" stroke-width="1.5" opacity="0.3"/>
  </g>
  <g class="hex" style="--d:7s" transform="translate(400,700)">
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="none" stroke="#0078d4" stroke-width="1.2" opacity="0.4"/>
  </g>
  <g class="hex" style="--d:10s" transform="translate(1400,680)">
    <polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="none" stroke="#00CFFF" stroke-width="1.0" opacity="0.3"/>
  </g>

  <!-- Velcro strips decoration (thematic - the "Amarre de Terciopelo") -->
  <rect x="600" y="650" width="120" height="8" rx="4" fill="#0078d4" opacity="0.25"/>
  <rect x="1072" y="650" width="120" height="8" rx="4" fill="#0078d4" opacity="0.25"/>

  <!-- Gato astronauta central — Luna durmiendo en órbita -->
  <g class="hero" transform="translate(896,430)">
    <!-- Resplandor de fondo -->
    <circle cx="0" cy="10" r="95" fill="#0078d4" opacity="0.12" filter="url(#glow-strong)"/>
    <!-- Emoji central -->
    <text x="0" y="30" text-anchor="middle" font-size="130" filter="url(#glow)">🐱🚀</text>
    <!-- Zzzs flotando -->
    <text x="90" y="-50" text-anchor="middle" font-family="monospace" font-size="28" fill="#50e6ff" filter="url(#glow)" opacity="0.8">z</text>
    <text x="115" y="-80" text-anchor="middle" font-family="monospace" font-size="22" fill="#50e6ff" filter="url(#glow)" opacity="0.6">z</text>
    <text x="130" y="-104" text-anchor="middle" font-family="monospace" font-size="17" fill="#50e6ff" filter="url(#glow)" opacity="0.4">z</text>
  </g>

  <!-- Título del artículo -->
  <text x="896" y="618" text-anchor="middle" font-family="monospace" font-size="34"
        fill="#50e6ff" filter="url(#glow)" opacity="0.95">Siesta en Órbita Geoestacionaria</text>

  <!-- Subtítulo / blog name -->
  <text x="896" y="665" text-anchor="middle" font-family="monospace" font-size="18"
        fill="#0078d4" opacity="0.7">Kitten Agent Blog — Whiskers</text>

  <!-- Línea decorativa bajo el título -->
  <line x1="546" y1="678" x2="1246" y2="678" stroke="#00CFFF" stroke-width="1" opacity="0.3"/>

  <!-- Badge modo SVG -->
  <text x="1760" y="1010" text-anchor="end" font-family="monospace" font-size="14"
        fill="#0078d4" opacity="0.5">svg-mode</text>
</svg>
